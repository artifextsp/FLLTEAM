<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · FLL Team</title>
    <link rel="stylesheet" href="css/base.css?v=20260423c" />
    <link rel="stylesheet" href="css/components.css?v=20260423c" />
    <link rel="stylesheet" href="css/layout.css?v=20260423c" />
    <link rel="stylesheet" href="css/responsive.css?v=20260423c" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
</head>
<body>
    <div class="login-wrap">
        <form class="login-box" id="form-login" autocomplete="on">
            <h1>FLL Team</h1>
            <p class="sub">Gestión de entrenamientos · Temporada UNEARTHED</p>

            <div class="form-field">
                <label for="email">Correo del coach</label>
                <input type="email" id="email" required autocomplete="email"
                       placeholder="tu@correo.com" />
            </div>

            <div class="form-field">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required
                       minlength="6" autocomplete="current-password"
                       placeholder="••••••••" />
            </div>

            <button class="btn btn--big" type="submit" id="btn-accion">
                Entrar
            </button>

            <p class="switch">
                <a href="#" id="toggle-modo">¿No tienes cuenta? Regístrate</a>
            </p>
        </form>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script src="config.js?v=20260423c"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js?v=20260423c"></script>
    <script src="js/utils.js?v=20260423c"></script>
    <script src="js/auth.js?v=20260423c"></script>
    <script>
        // Lógica local de la pantalla de login / registro.
        (() => {
            let modoRegistro = false;
            const form       = document.getElementById("form-login");
            const btnAccion  = document.getElementById("btn-accion");
            const toggle     = document.getElementById("toggle-modo");
            const emailEl    = document.getElementById("email");
            const passEl     = document.getElementById("password");

            // Si ya hay sesión, salta al app.
            (async () => {
                const { data } = await supabase.auth.getSession();
                if (data.session) window.location.replace("app.html");
            })();

            toggle.addEventListener("click", (e) => {
                e.preventDefault();
                modoRegistro = !modoRegistro;
                btnAccion.textContent = modoRegistro ? "Registrarme" : "Entrar";
                toggle.textContent    = modoRegistro
                    ? "¿Ya tienes cuenta? Entrar"
                    : "¿No tienes cuenta? Regístrate";
            });

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                btnAccion.disabled = true;
                try {
                    if (modoRegistro) {
                        await FllAuth.registrar(emailEl.value, passEl.value);
                        toast("Cuenta creada. Revisa tu correo si es requerido.", "success");
                    } else {
                        await FllAuth.iniciarSesion(emailEl.value, passEl.value);
                    }
                    window.location.replace("app.html");
                } catch (err) {
                    toast(err.message || "No se pudo autenticar", "error");
                } finally {
                    btnAccion.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
